const GAS_URL = 'https://script.google.com/macros/s/AKfycbx7NrJYDN3FbdL517_fLtHYQ9rabkyq__VQ-Cu2sC9h6zg4e0mY7_admtPFb2AlPtwVDQ/exec';
const OWNERS = {
  'PECO':       { bg:'#EEEDFE', color:'#3C3489' },
  '飼い主':     { bg:'#D8EFE4', color:'#085041' },
  'クライアント':{ bg:'#FAEEDA', color:'#633806' },
  'モデル':     { bg:'#FAECE7', color:'#712B13' },
  'カメラマン': { bg:'#E6F1FB', color:'#0C447C' },
};
const OWNER_KEYS = ['PECO','飼い主','クライアント','モデル','カメラマン'];
function ownerStyle(n){ const o=OWNERS[n]||{bg:'#F1EFE8',color:'#444441'}; return `background:${o.bg};color:${o.color};`; }
function safeKey(s){ return s.replace(/[^a-zA-Z0-9\u3000-\u9fff\u4e00-\u9fff]/g,'_'); }
function fixUrl(url){
  if(!url||url.includes('ファイルID')||!url.trim()) return '';
  url=url.trim();
  const m1=url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  if(m1) return 'https://drive.google.com/uc?export=view&id='+m1[1];
  const m2=url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if(m2) return 'https://drive.google.com/uc?export=view&id='+m2[1];
  return url;
}

let sheetsData=[], sheetsLoaded=false, sheetsError=false;
// GAS経由で画像をbase64取得
const imgBase64Cache = {};
function fetchImgViaGAS(url) {
  return new Promise((resolve) => {
    if(!url) return resolve(null);
    // ローカル画像はキャッシュからそのまま返す
    if(url.startsWith('local:')) return resolve(imgBase64Cache[url] || null);
    if(imgBase64Cache[url]) return resolve(imgBase64Cache[url]);
    const cbName = 'imgCallback_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const scriptEl = document.createElement('script');
    window[cbName] = function(data) {
      delete window[cbName];
      try { if(scriptEl.parentNode) scriptEl.parentNode.removeChild(scriptEl); } catch(e){}
      if(data && data.base64 && !data.error) {
        const dataUrl = 'data:' + data.mimeType + ';base64,' + data.base64;
        imgBase64Cache[url] = dataUrl;
        resolve(dataUrl);
      } else {
        resolve(null);
      }
    };
    scriptEl.onerror = function(){ delete window[cbName]; resolve(null); };
    scriptEl.src = GAS_URL + '?action=getImage&url=' + encodeURIComponent(url) + '&callback=' + cbName;
    document.head.appendChild(scriptEl);
  });
}

function loadSheets(){
  sheetsLoaded=false; sheetsError=false;
  return new Promise((resolve)=>{
    const cbName='gasCallback_'+Date.now();
    window[cbName]=function(json){
      try{
        sheetsData=json.map(r=>({
          cat:(r.cat||'').trim(), name:(r.name||'').trim(), img:fixUrl((r.img||'').trim())
        })).filter(r=>r.cat&&r.name);
        sheetsLoaded=true;
      }catch(e){ sheetsError=true; }
      delete window[cbName];
      if(script.parentNode) script.parentNode.removeChild(script);
      resolve();
    };
    const script=document.createElement('script');
    script.onerror=function(){ sheetsError=true; delete window[cbName]; resolve(); };
    script.src=GAS_URL+'?callback='+cbName;
    document.head.appendChild(script);
  });
}

function changeOwner(caseId, sk, val){
  const c=cases.find(c=>c.id===caseId); if(!c) return;
  if(!c.owners) c.owners={};
  c.owners[sk]=val;
  // selectの色だけ更新（valueはonchangeで既に変わっている）
  const sel=document.getElementById('owner_'+caseId+'_'+sk);
  if(sel){
    const o=OWNERS[val]||{bg:'#F1EFE8',color:'#444441'};
    sel.style.background=o.bg;
    sel.style.color=o.color;
  }
  saveToLocal();
}
function uploadLocalImage(caseId, field, input) {
  const files = input.files;
  if(!files || !files.length) return;
  const c = cases.find(c=>c.id===caseId); if(!c) return;
  if(!c.localImages) c.localImages = {};
  if(!c.bihinFields) c.bihinFields = {};

  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = function(e) {
      const dataUrl = e.target.result;
      const name = file.name.replace(/\.[^.]+$/, ''); // 拡張子除去
      // localImagesに保存
      c.localImages[name] = dataUrl;
      // bihinFieldsにも追加
      if(!c.bihinFields[field]) c.bihinFields[field] = [];
      if(!c.bihinFields[field].includes(name)) c.bihinFields[field].push(name);
      // imgBase64Cacheにも登録（PPTXで使う）
      imgBase64Cache['local:'+name] = dataUrl;
      saveToLocal();
      renderMain();
    };
    reader.readAsDataURL(file);
  });
  input.value = ''; // リセット
}
function toggleNotNeeded(caseId, sk){
  const c=cases.find(c=>c.id===caseId); if(!c) return;
  if(!c.notNeeded) c.notNeeded={};
  c.notNeeded[sk]=!c.notNeeded[sk];
  const row=document.getElementById('row_'+caseId+'_'+sk);
  if(row) row.classList.toggle('not-needed',!!c.notNeeded[sk]);
  const btn=document.getElementById('nn_'+caseId+'_'+sk);
  if(btn){ btn.classList.toggle('active',!!c.notNeeded[sk]); btn.textContent=c.notNeeded[sk]?'✕ 不要':'不要'; }
  refreshProgress(c);
  saveToLocal();
}
function addCase(){
  const name=prompt('案件名を入力してください\n例：春キャンペーン、○○フード撮影');
  if(!name||!name.trim()) return;
  const id=Date.now();
  cases.push({id,name:name.trim(),modelType:'犬単体',date:'',checks:{},memos:{},qtys:{},bihinFields:{},bihin:[]});
  activeCaseId=id; renderAll();
}
function switchCase(id){ activeCaseId=id; renderAll(); }
function getActive(){ return cases.find(c=>c.id===activeCaseId)||null; }
function deleteCase(id){
  if(!confirm('この案件を削除しますか？')) return;
  cases=cases.filter(c=>c.id!==id);
  activeCaseId=cases.length?cases[0].id:null; saveToLocal(); renderAll();
}
function toggleCheck(caseId,sk){
  const c=cases.find(c=>c.id===caseId); if(!c) return;
  c.checks[sk]=!c.checks[sk];
  const row=document.getElementById('row_'+caseId+'_'+sk);
  if(row) row.classList.toggle('done',!!c.checks[sk]);
  refreshProgress(c);
  saveToLocal();
}
function saveMemo(caseId,sk,val){ const c=cases.find(c=>c.id===caseId); if(c){ c.memos[sk]=val; saveToLocal(); } }
function saveQty(caseId,sk,val){
  const c=cases.find(c=>c.id===caseId); if(!c) return;
  c.qtys[sk]=val;
  const row=document.getElementById('row_'+caseId+'_'+sk);
  const isZero=(val==='0'||val===0||val==='');
  if(row) row.classList.toggle('not-needed', val==='0');

function removeTag(caseId,field,item){

  c.bihinFields[field]=(c.bihinFields[field]||[]).filter(i=>i!==item); saveToLocal(); renderMain();
}
function removeBihin(caseId,item){

  c.bihin=(c.bihin||[]).filter(i=>i!==item); saveToLocal(); renderMain();
}
function onModelChange(caseId,val){
  const c=cases.find(c=>c.id===caseId);
  if(c){c.modelType=val; c.checks={}; c.memos={}; c.qtys={}; c.bihinFields={};}
  saveToLocal(); renderMain();
}
function onDateChange(caseId,val){ const c=cases.find(c=>c.id===caseId); if(c){ c.date=val; saveToLocal(); } }
function resetChecks(){
  const c=getActive();
  if(!c||!confirm('チェックをすべてリセットしますか？')) return;
  c.checks={}; c.memos={}; c.qtys={}; c.bihinFields={}; renderMain();
}
function refreshProgress(c){
  const secs=getSections(c.modelType);
  let total=0,done=0;
  secs.forEach(s=>{
    s.items.forEach(item=>{
      const sk=safeKey(s.key+'__'+item.text);
      if(c.notNeeded&&c.notNeeded[sk]) return;
      if(item.qty&&(c.qtys&&c.qtys[sk]==='0'||c.qtys&&c.qtys[sk]===0)) return;
      total++; if(c.checks[sk]) done++;
    });
  });
  (c.bihin||[]).forEach(item=>{ total++; if(c.checks[safeKey('bihin__'+item)]) done++; });
  const pct=total?Math.round(done/total*100):0;
  const f=document.getElementById('prog-fill'),t=document.getElementById('prog-text'),p=document.getElementById('prog-pct');
  if(f) f.style.width=pct+'%';
  if(t) t.textContent=done+' / '+total+' 項目チェック済み';
  if(p) p.textContent=pct+'%';
}

async function openBihin(caseId, field, catFilter){
  bihinTargetId=caseId; bihinTargetField=field; bihinCatFilter=catFilter||null;
  const c=cases.find(c=>c.id===caseId)||{bihin:[],bihinFields:{}};
  if(field==='bihin') bihinSelected=new Set(c.bihin||[]);
  else bihinSelected=new Set((c.bihinFields||{})[field]||[]);
  activeCat=catFilter||'all';
  const title = catFilter==='衣装'?'👗 衣装を選ぶ':catFilter==='おもちゃ'?'🎾 おもちゃを選ぶ':catFilter?`📦 ${catFilter}から選ぶ`:'📦 備品リストから選ぶ';
  document.getElementById('modal-title').textContent=title;
  document.getElementById('bihin-search').value='';
  document.getElementById('bihin-modal').classList.add('open');
  document.getElementById('bihin-grid').innerHTML='<div class="loading-msg">読み込み中...</div>';

function getFiltered(){
  const data=getBihinData();
  const q=document.getElementById('bihin-search').value.toLowerCase();
  return data.filter(r=>{
    if(bihinCatFilter&&bihinCatFilter!=='all'&&activeCat==='all'&&!r.cat.includes(bihinCatFilter)) return false;
    if(activeCat!=='all'&&r.cat!==activeCat) return false;
    if(q&&!r.name.toLowerCase().includes(q)&&!r.cat.toLowerCase().includes(q)) return false;
    return true;
  });
}
function renderCatFilter(){
  const data=getBihinData();
  const cats=[...new Set(data.filter(r=>!bihinCatFilter||r.cat.includes(bihinCatFilter)).map(r=>r.cat))];
  let html=`<button class="cat-btn${activeCat==='all'?' active':''}" onclick="setCat('all')">すべて</button>`;
  cats.forEach(c=>{ const esc=c.replace(/'/g,"\\'"); html+=`<button class="cat-btn${activeCat===c?' active':''}" onclick="setCat('${esc}')">${c}</button>`; });
  document.getElementById('cat-filter').innerHTML=html;

    <span style="font-size:12px;color:var(--text3);margin-right:4px;">担当:</span>

    <span style="font-size:11px;color:var(--text3);margin-left:4px;">▼で担当変更可</span>

      <div class="section-head"><span>${sec.icon}</span>${sec.key}</div>
      <div class="section-body">`;
    sec.items.forEach(item=>{
      const sk=safeKey(sec.key+'__'+item.text);
      const isDone=!!c.checks[sk];
      const isNotNeeded=!!(c.notNeeded&&c.notNeeded[sk])||(item.qty&&(c.qtys&&c.qtys[sk])==='0');
      const memoVal=(c.memos&&c.memos[sk])||'';
      const qtyVal=(c.qtys&&c.qtys[sk])||'';

        <div class="check-label-row" onclick="toggleCheck(${c.id},'${sk}')">

          <div class="item-right">
            ${item.qty
              ?`<div class="qty-wrap"><span>必要数:</span><input type="number" min="0" value="${qtyVal}" placeholder="-" title="0で不要扱い" onclick="event.stopPropagation()" onchange="saveQty(${c.id},'${sk}',this.value)"></div>`
              :`<button class="not-needed-btn${isNotNeeded?' active':''}" id="nn_${c.id}_${sk}" onclick="event.stopPropagation();toggleNotNeeded(${c.id},'${sk}')">${isNotNeeded?'✕ 不要':'不要'}</button>`}
            ${(()=>{
              const effectiveOwner=(c.owners&&c.owners[sk])||item.owner;
              const o=OWNERS[effectiveOwner]||{bg:'#F1EFE8',color:'#444441'};
              const opts=OWNER_KEYS.map(k=>`<option value="${k}"${k===effectiveOwner?' selected':''}>${k}</option>`).join('');
              return `<select class="owner-select" id="owner_${c.id}_${sk}" style="background:${o.bg};color:${o.color};" onclick="event.stopPropagation()" onchange="changeOwner(${c.id},'${sk}',this.value)">${opts}</select>`;
            })()}

      if(item.bihin||item.itemMemo){

          if(selectedBihin.length){
            html+=`<div class="selected-photo-tags">`;

              const esc=t.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

              const bitem=getBihinData().find(b=>b.name===t);

                ${img?`<img src="${img}" onerror="this.style.display='none'">`:`<div class="ph">📦</div>`}
                <span>${t}</span>
                <button onclick="removeTag(${c.id},'${fesc}','${esc}')">×</button>
              </div>`;
            });
            html+=`</div>`;
          }
          const catLabel=item.bihinCat||'';
          const catDisp=catLabel==='衣装'?'👗 衣装':catLabel==='おもちゃ'?'🎾 おもちゃ':`📦 備品`;
          const fesc=fieldKey.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
          html+=`<div style="display:flex;gap:6px;flex-wrap:wrap;">`;
          html+=`<button class="btn-open" onclick="openBihin(${c.id},'${fesc}','${catLabel}')">${catDisp}リストから選ぶ</button>`;
          html+=`<label class="btn-open" style="cursor:pointer;">📎 画像をアップ<input type="file" accept="image/*" multiple style="display:none;" onchange="uploadLocalImage(${c.id},'${fesc}',this)"></label>`;
          html+=`</div>`;
        }
        if(item.itemMemo){
          html+=`<textarea class="memo-input" rows="1" placeholder="メモ" onchange="saveMemo(${c.id},'${sk}',this.value)">${memoVal}</textarea>`;
        }
        html+=`</div>`;
      }
      html+=`</div>`;
    });
    if(sec.sectionMemo){
      const smk=safeKey(sec.key+'__section_memo');
      const smv=(c.memos&&c.memos[smk])||'';
      html+=`<div class="section-memo">
        <div class="section-memo-label">📝 セクションメモ</div>
        <textarea class="memo-input" rows="2" placeholder="${sec.key}に関するメモ・備考..." onchange="saveMemo(${c.id},'${smk}',this.value)">${smv}</textarea>
      </div>`;
    }
    html+=`</div></div>`;
  });

  // その他備品
  const bihinList=c.bihin||[];
  html+=`<div class="section"><div class="section-head"><span>📦</span>その他備品（備品リストから選択）</div>`;
  if(bihinList.length){
    bihinList.forEach(item=>{
      const sk=safeKey('bihin__'+item);
      const isDone=!!c.checks[sk];
      const bitem=getBihinData().find(b=>b.name===item);
      const img=bitem&&bitem.img?bitem.img:'';
      html+=`<div class="check-item${isDone?' done':''}" id="row_${c.id}_${sk}">
        <div class="check-label-row" onclick="toggleCheck(${c.id},'${sk}')">
          <div class="check-box"><div class="checkmark"></div></div>
          ${img?`<img class="bihin-thumb" src="${img}" onerror="this.style.display='none'">`:`<div class="bihin-thumb-ph">📦</div>`}
          <span class="item-text">${item}</span>
          <div class="item-right">
            ${(()=>{
              const bsk=safeKey('bihin__'+item);
              const effectiveOwner=(c.owners&&c.owners[bsk])||'PECO';
              const o=OWNERS[effectiveOwner]||{bg:'#F1EFE8',color:'#444441'};
              const opts=OWNER_KEYS.map(k=>`<option value="${k}"${k===effectiveOwner?' selected':''}>${k}</option>`).join('');
              return `<select class="owner-select" id="owner_${c.id}_${bsk}" style="background:${o.bg};color:${o.color};" onclick="event.stopPropagation()" onchange="changeOwner(${c.id},'${bsk}',this.value)">${opts}</select>`;
            })()}
          </div>
        </div>
      </div>`;
    });
  } else {
    html+=`<div style="padding:10px 1.25rem;font-size:13px;color:var(--text3);">備品リストから必要なものを選んで追加してください</div>`;
  }
  html+=`<div style="padding:8px 1.25rem;border-top:1px solid var(--border);">
    <button class="btn-open" onclick="openBihin(${c.id},'bihin',null)">＋ 備品リストから追加・変更</button>
  </div></div>`;

  html+=`<div class="action-row">
    <button class="btn accent" onclick="exportPPM(${c.id})">📊 PPMを出力（PPTX）</button>
    <button class="btn" onclick="resetChecks()">↺ チェックをリセット</button>
    <button class="btn danger" onclick="deleteCase(${c.id})">🗑 この案件を削除</button>
  </div>`;
  area.innerHTML=html;
}

}
function importData(event){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(data.cases){
        if(!confirm('現在のデータを上書きしますか？')) return;
        cases=data.cases;
        activeCaseId=data.activeCaseId||( cases.length?cases[0].id:null);
        saveToLocal(); renderAll();
        alert('インポートが完了しました！');
      }
    }catch(err){ alert('ファイルの読み込みに失敗しました'); }
  };
  reader.readAsText(file);
}

const VISUAL_SECS_SET = new Set(['犬の持ち物','猫の持ち物','モデル関連','飼い主関連']);

async function exportPPM(caseId, orientation) {
  if(!orientation) {
    const modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;display:flex;align-items:center;justify-content:center;';
    modal.innerHTML = `<div style="background:white;border-radius:10px;padding:1.5rem;width:320px;text-align:center;font-family:Noto Sans JP,sans-serif;">
      <div style="font-size:16px;font-weight:700;margin-bottom:1rem;color:#1C1A17;">📊 PPMの向きを選択</div>

        <button onclick="document.body.removeChild(this.closest('[style*=fixed]'));exportPPM(${caseId},'landscape')" style="flex:1;padding:14px 8px;border:2px solid #185FA5;border-radius:8px;cursor:pointer;background:#E6F1FB;color:#185FA5;font-weight:700;font-family:inherit;font-size:14px;">
          🖥 横向き<br><span style="font-size:11px;font-weight:400;">16:9（スライド）</span>
        </button>
        <button onclick="document.body.removeChild(this.closest('[style*=fixed]'));exportPPM(${caseId},'portrait')" style="flex:1;padding:14px 8px;border:2px solid #185FA5;border-radius:8px;cursor:pointer;background:#E6F1FB;color:#185FA5;font-weight:700;font-family:inherit;font-size:14px;">
          📄 縦向き<br><span style="font-size:11px;font-weight:400;">A4縦（印刷向き）</span>
        </button>
      </div>
      <button onclick="document.body.removeChild(this.closest('[style*=fixed]'))" style="font-size:13px;color:#9A9490;background:none;border:none;cursor:pointer;">キャンセル</button>
    </div>`;
    document.body.appendChild(modal);
    return;
  }

  const c = cases.find(c=>c.id===caseId); if(!c) return;

  const OC = {'PECO':'3C3489','飼い主':'085041','クライアント':'633806','モデル':'712B13','カメラマン':'0C447C'};
  const OB = {'PECO':'EEEDFE','飼い主':'D8EFE4','クライアント':'FAEEDA','モデル':'FAECE7','カメラマン':'E6F1FB'};
  const CC = {header:'185FA5',light:'EBF3FB',lightMid:'B5D4F4',bg:'FFFFFF',row1:'F7FAFD',row2:'FFFFFF',border:'B5D4F4',text:'1C1A17',text2:'5A5552',text3:'9A9490',secbg:'EBF3FB',sectext:'0C447C',accent:'85B7EB'};
  const DO = {'犬の持ち物':{'ワクチン接種証明書':'飼い主','狂犬病証明書':'飼い主','リード・ハーネス・首輪':'飼い主','犬用の水・給水器':'飼い主','好きなおやつ（コントロール用）':'飼い主','おもちゃ（コントロール用）':'飼い主'},'猫の持ち物':{'ワクチン接種証明書':'飼い主','キャリーバッグ（慣れたもの）':'飼い主','猫用おやつ・フェリウェイ':'飼い主','好きなおやつ（コントロール用）':'飼い主','おもちゃ（コントロール用）':'飼い主'},'モデル関連':{'衣装':'モデル','持ち物':'モデル','ペット同伴の場合の確認':'PECO'},'飼い主関連':{'衣装':'飼い主','飼い主の緊急連絡先を共有済みか':'PECO'}};
  const SD = {'犬の持ち物':{icon:'🐶',items:['ワクチン接種証明書','狂犬病証明書','リード・ハーネス・首輪','犬用の水・給水器','好きなおやつ（コントロール用）','おもちゃ（コントロール用）']},'猫の持ち物':{icon:'🐱',items:['ワクチン接種証明書','キャリーバッグ（慣れたもの）','猫用おやつ・フェリウェイ','好きなおやつ（コントロール用）','おもちゃ（コントロール用）']},'モデル関連':{icon:'👤',items:['衣装','持ち物','ペット同伴の場合の確認']},'飼い主関連':{icon:'🏠',items:['衣装','飼い主の緊急連絡先を共有済みか']},'衛生用品（ペット用）':{icon:'🧹',items:['トイレシーツ','消臭スプレー（ペット用）','マナーバッグ・ビニール袋','タオル']},'衛生用品（人用）':{icon:'🧴',items:['ティッシュ','ウェットティッシュ','コロコロ','ゴミ袋（小）','ゴミ袋（中）','ゴミ袋（大）','ガムテープ','養生テープ','救急セット','カイロ']},'ケータリング':{icon:'☕',items:['水・お茶・飲み物','紙コップ','朝食','軽食（スナック、飴）','昼食（お弁当）']},'書類':{icon:'📋',items:['PPM','当日の香盤・スケジュール表']}};
  const MS = {'犬単体':['犬の持ち物','衛生用品（ペット用）','衛生用品（人用）','ケータリング','書類'],'猫単体':['猫の持ち物','衛生用品（ペット用）','衛生用品（人用）','ケータリング','書類'],'犬＋モデル':['犬の持ち物','モデル関連','衛生用品（ペット用）','衛生用品（人用）','ケータリング','書類'],'猫＋モデル':['猫の持ち物','モデル関連','衛生用品（ペット用）','衛生用品（人用）','ケータリング','書類'],'犬＋飼い主':['犬の持ち物','飼い主関連','衛生用品（ペット用）','衛生用品（人用）','ケータリング','書類'],'猫＋飼い主':['猫の持ち物','飼い主関連','衛生用品（ペット用）','衛生用品（人用）','ケータリング','書類']};

  function sk(s){return s.replace(/[^a-zA-Z0-9\u3000-\u9fff\u4e00-\u9fff]/g,'_');}
  function getOwn(secKey,itemText){return(c.owners||{})[sk(secKey+'__'+itemText)]||(DO[secKey]||{})[itemText]||'PECO';}

  const isL = orientation!=='portrait';
  const W=isL?10:7.5, H=isL?5.625:10.5, MX=0.3, TW=W-MX*2;
  const CARD_COLS=isL?5:4, HDR_H=isL?0.65:0.8, CONT_Y=HDR_H+0.15;
  const CARD_W=(TW-(CARD_COLS-1)*0.12)/CARD_COLS, CARD_H=isL?1.5:1.6;
  const SEC_LH=isL?0.28:0.25, IMG_H=CARD_H-0.38, GAP_X=0.12, GAP_Y=0.1;
  const TBL_Y=HDR_H+0.25, ROW_HB=isL?0.55:0.25, ROW_HS=isL?0.14:0.12, SEC_HT=isL?0.32:0.22;
  const TROWS_PER=isL?8:20;
  const COL_W=isL?[0.4,TW-0.4-1.5-0.6-0.9,1.5,0.6,0.9]:[0.4,TW-0.4-1.2-0.6-0.8,1.2,0.6,0.8];

  // ビジュアルグループ収集
  const secKeys = MS[c.modelType]||MS['犬単体'];
  const vGroups = [];
  secKeys.filter(k=>VISUAL_SECS_SET.has(k)).forEach(secKey=>{
    const sec=SD[secKey]; if(!sec) return;
    const gitems=[];
    sec.items.forEach(itemText=>{
      const itemSk=sk(secKey+'__'+itemText);
      if((c.notNeeded||{})[itemSk]||(c.qtys||{})[itemSk]==='0') return;
      const bihin=((c.bihinFields||{})[secKey+'__'+itemText+'__bihin'])||[];
      const owner=getOwn(secKey,itemText);
      if(bihin.length){
        bihin.forEach(bn=>{
          const bi=getBihinData().find(b=>b.name===bn);
          // ローカルアップロード画像を確認
          const localImg = (c.localImages||{})[bn] ? 'local:'+bn : '';
          gitems.push({name:bn,img:localImg||(bi&&bi.img)||'',owner});
        });
      } else {
        gitems.push({name:itemText,img:'',owner});
      }
    });
    if(gitems.length) vGroups.push({label:secKey,icon:sec.icon,items:gitems});
  });

  // テーブル行収集
  const tRows=[]; let no=1;
  secKeys.filter(k=>!VISUAL_SECS_SET.has(k)).forEach(secKey=>{
    const sec=SD[secKey]; if(!sec) return;
    tRows.push({type:'section',label:`■${secKey}`});
    sec.items.forEach(itemText=>{
      const itemSk=sk(secKey+'__'+itemText);
      if((c.notNeeded||{})[itemSk]||(c.qtys||{})[itemSk]==='0') return;
      const qty=(c.qtys||{})[itemSk]||''; const memo=(c.memos||{})[itemSk]||'';
      const bihin=((c.bihinFields||{})[secKey+'__'+itemText+'__bihin'])||[];
      const owner=getOwn(secKey,itemText);
      const bitem=bihin.length?getBihinData().find(b=>b.name===bihin[0]):null;
      const img=bitem&&bitem.img?bitem.img:'';
      let nl=[itemText]; if(bihin.length) bihin.forEach(b=>nl.push('  - '+b)); if(memo) nl.push('  📝'+memo);
      tRows.push({type:'item',no:no++,nameLines:nl,qty:qty||'-',owner,img});
    });
  });
  if((c.bihin||[]).length){
    tRows.push({type:'section',label:'■その他備品'});
    c.bihin.forEach(item=>{const bi=getBihinData().find(b=>b.name===item);tRows.push({type:'item',no:no++,nameLines:[item],qty:'-',owner:'PECO',img:(bi&&bi.img)||''});});
  }

  // ビジュアルスライド分割
  let vSlides=[[]]; let cy=CONT_Y;
  vGroups.forEach(g=>{
    const rows=Math.ceil(g.items.length/CARD_COLS);
    const gh=SEC_LH+rows*(CARD_H+GAP_Y);
    if(cy+gh>H-0.1&&vSlides[vSlides.length-1].length>0){vSlides.push([]);cy=CONT_Y;}
    vSlides[vSlides.length-1].push({...g,startY:cy});
    cy+=gh+0.15;
  });

  // テーブルスライド分割
  let tPages=[[]]; let tc=0; let ps=null;
  tRows.forEach(r=>{
    if(r.type==='section'){ps=r;}
    else{
      if(tc>=TROWS_PER){tPages.push([]);tc=0;ps=null;}
      if(ps){if(tc>=TROWS_PER-1){tPages.push([]);tc=0;}tPages[tPages.length-1].push(ps);tc+=0.5;ps=null;}
      tPages[tPages.length-1].push(r);tc++;
    }
  });

  const TOTAL=1+vSlides.filter(s=>s.length>0).length+tPages.filter(s=>s.length>0).length;
  let pno=1;

  const pres=new PptxGenJS();
  if(!isL){pres.defineLayout({name:'A4P',width:7.5,height:10.5});pres.layout='A4P';}
  else pres.layout='LAYOUT_16x9';

  function addHdr(slide,title,pn,tot){
    slide.addShape(pres.shapes.RECTANGLE,{x:0,y:0,w:W,h:HDR_H-0.1,fill:{color:CC.header}});
    slide.addText(title,{x:MX,y:0.08,w:W-MX-1.5,h:isL?0.35:0.42,fontSize:isL?14:12,bold:true,color:'FFFFFF',fontFace:'Meiryo',margin:0});
    slide.addText(`${pn} / ${tot}`,{x:W-1.5,y:0.08,w:1.3,h:isL?0.35:0.42,fontSize:12,color:CC.lightMid,align:'right',margin:0,fontFace:'Meiryo'});
    slide.addText(`${c.date?c.date+'　':''}${c.modelType}`,{x:MX,y:isL?0.44:0.5,w:W-MX,h:0.25,fontSize:10,color:CC.lightMid,margin:0,fontFace:'Meiryo'});
  }

  // タイトル
  const ts=pres.addSlide(); ts.background={color:CC.header};
  ts.addShape(pres.shapes.RECTANGLE,{x:0,y:H*0.55,w:0.2,h:H*0.38,fill:{color:CC.accent}});
  ts.addText('撮影備品リスト',{x:0.5,y:H*0.28,w:W-1,h:H*0.2,fontSize:isL?38:32,bold:true,color:'FFFFFF',fontFace:'Meiryo',margin:0});
  ts.addText([{text:c.name,options:{bold:true,breakLine:true}},{text:`モデルタイプ：${c.modelType}　${c.date?'撮影日：'+c.date:''}`,options:{bold:false}}],{x:0.5,y:H*0.52,w:W-1,h:H*0.22,fontSize:isL?15:13,color:CC.lightMid,fontFace:'Meiryo',margin:0});
  ts.addText(`作成日：${new Date().toLocaleDateString('ja-JP')}`,{x:0,y:H-0.4,w:W,h:0.35,fontSize:10,color:CC.accent,align:'right',margin:0,fontFace:'Meiryo'});

  // 画像を事前にGAS経由で取得
  const allImgUrls = [];
  vGroups.forEach(g => g.items.forEach(item => {
    if(item.img && !allImgUrls.includes(item.img)) allImgUrls.push(item.img);
  }));
  console.log('取得する画像URL一覧:', allImgUrls);
  for(const url of allImgUrls) {
    const result = await fetchImgViaGAS(url);
    console.log('画像取得結果:', url.slice(-30), result ? '成功' : '失敗');
  }
  console.log('キャッシュ完了:', Object.keys(imgBase64Cache).length, '件');

  // ビジュアルスライド
  vSlides.forEach(groups=>{
    if(!groups.length) return;
    const slide=pres.addSlide(); slide.background={color:CC.bg};
    addHdr(slide,`${c.name}　出演者・衣装 / ペット持ち物`,pno++,TOTAL-1);
    groups.forEach(g=>{
      slide.addShape(pres.shapes.RECTANGLE,{x:MX,y:g.startY,w:TW,h:SEC_LH-0.04,fill:{color:CC.secbg}});
      slide.addShape(pres.shapes.RECTANGLE,{x:MX,y:g.startY,w:0.05,h:SEC_LH-0.04,fill:{color:CC.header}});
      slide.addText(`${g.icon} ${g.label}`,{x:MX+0.1,y:g.startY,w:TW-0.1,h:SEC_LH-0.04,fontSize:11,bold:true,color:CC.sectext,fontFace:'Meiryo',valign:'middle',margin:0});
      g.items.forEach((item,idx)=>{
        const col=idx%CARD_COLS, row=Math.floor(idx/CARD_COLS);
        const cx=MX+col*(CARD_W+GAP_X), cy2=g.startY+SEC_LH+row*(CARD_H+GAP_Y);
        slide.addShape(pres.shapes.ROUNDED_RECTANGLE,{x:cx,y:cy2,w:CARD_W,h:CARD_H,fill:{color:'F7FAFD'},rectRadius:0.08,line:{color:CC.border,width:0.75}});
        slide.addShape(pres.shapes.ROUNDED_RECTANGLE,{x:cx+0.06,y:cy2+0.04,w:CARD_W-0.12,h:IMG_H-0.05,fill:{color:CC.light},rectRadius:0.05,line:{color:CC.border}});
        const imgData = imgBase64Cache[item.img];
        if(imgData){
          const is=Math.min(CARD_W-0.1,IMG_H-0.05);
          slide.addImage({data:imgData,x:cx+(CARD_W-is)/2,y:cy2+0.04,w:is,h:is});
        } else {
          slide.addText('No Image',{x:cx+0.06,y:cy2+0.04,w:CARD_W-0.12,h:IMG_H-0.05,fontSize:9,color:CC.text3,align:'center',valign:'middle',fontFace:'Meiryo',margin:0});
        }
        slide.addText(item.name,{x:cx+0.04,y:cy2+IMG_H+0.02,w:CARD_W-0.08,h:0.22,fontSize:9,color:CC.text,fontFace:'Meiryo',align:'center',valign:'middle',margin:0});
        const oc=OC[item.owner]||'444441',ob=OB[item.owner]||'F1EFE8';
        const tw2=Math.min(CARD_W-0.12,0.7),tx=cx+(CARD_W-tw2)/2;
        slide.addShape(pres.shapes.ROUNDED_RECTANGLE,{x:tx,y:cy2+CARD_H-0.22,w:tw2,h:0.18,fill:{color:ob},rectRadius:0.04,line:{color:ob}});
        slide.addText(item.owner,{x:tx,y:cy2+CARD_H-0.22,w:tw2,h:0.18,fontSize:8,color:oc,align:'center',valign:'middle',fontFace:'Meiryo',bold:true,margin:0});
      });
    });
  });

  // テーブル画像も事前取得
  const tImgUrls = [];
  tRows.forEach(r => { if(r.img && !tImgUrls.includes(r.img)) tImgUrls.push(r.img); });
  for(const url of tImgUrls) { await fetchImgViaGAS(url); }

  // テーブルスライド
  tPages.forEach(pageRows=>{
    if(!pageRows.length) return;
    const slide=pres.addSlide(); slide.background={color:CC.bg};
    addHdr(slide,`${c.name}　備品リスト`,pno++,TOTAL-1);
    let tcy=TBL_Y; const TH=0.3;
    slide.addShape(pres.shapes.RECTANGLE,{x:MX,y:tcy,w:TW,h:TH,fill:{color:CC.header}});
    let tcx=MX;
    ['No','名称','実物画像','個数','担当'].forEach((h,i)=>{
      slide.addText(h,{x:tcx,y:tcy,w:COL_W[i],h:TH,fontSize:11,bold:true,color:'FFFFFF',fontFace:'Meiryo',align:'center',valign:'middle',margin:0});
      tcx+=COL_W[i];
    });
    tcy+=TH;
    pageRows.forEach((row,ri)=>{
      if(row.type==='section'){
        slide.addShape(pres.shapes.RECTANGLE,{x:MX,y:tcy,w:TW,h:SEC_HT,fill:{color:CC.secbg}});
        slide.addShape(pres.shapes.RECTANGLE,{x:MX,y:tcy,w:0.05,h:SEC_HT,fill:{color:CC.header}});
        slide.addText(row.label,{x:MX+0.1,y:tcy,w:TW-0.1,h:SEC_HT,fontSize:10,bold:true,color:CC.sectext,fontFace:'Meiryo',valign:'middle',margin:0});
        tcy+=SEC_HT;
      } else {
        const sc=row.nameLines?row.nameLines.length-1:0;
        const rhBase=ROW_HB+sc*ROW_HS;
        const rhMin=row.img?(isL?0.6:0.5):0;
        const rh=Math.max(rhBase,rhMin);
        const bgc=ri%2===0?CC.row1:CC.row2;
        slide.addShape(pres.shapes.RECTANGLE,{x:MX,y:tcy,w:TW,h:rh,fill:{color:bgc},line:{color:CC.border,width:0.5}});
        tcx=MX;
        slide.addText(String(row.no),{x:tcx,y:tcy,w:COL_W[0],h:rh,fontSize:10,color:CC.text2,align:'center',valign:'middle',fontFace:'Meiryo',margin:0}); tcx+=COL_W[0];
        const ni=row.nameLines.map((l,i)=>({text:l,options:{breakLine:i<row.nameLines.length-1,fontSize:l.startsWith('  ')?9:11,color:l.startsWith('  📝')?'888884':CC.text,bold:i===0}}));
        slide.addText(ni,{x:tcx+0.04,y:tcy+0.02,w:COL_W[1]-0.08,h:rh-0.04,fontFace:'Meiryo',valign:'top',margin:0}); tcx+=COL_W[1];
        const tImgData=imgBase64Cache[row.img];
        if(tImgData){const is=rh*0.82;slide.addImage({data:tImgData,x:tcx+(COL_W[2]-is)/2,y:tcy+(rh-is)/2,w:is,h:is});}
        else slide.addText('−',{x:tcx,y:tcy,w:COL_W[2],h:rh,fontSize:10,color:'CCCCCC',align:'center',valign:'middle',fontFace:'Meiryo',margin:0});
        tcx+=COL_W[2];
        slide.addText(row.qty||'-',{x:tcx,y:tcy,w:COL_W[3],h:rh,fontSize:11,color:CC.text,align:'center',valign:'middle',fontFace:'Meiryo',margin:0}); tcx+=COL_W[3];
        const oc=OC[row.owner]||'444441',ob=OB[row.owner]||'F1EFE8';
        const pw=Math.min(COL_W[4]-0.1,0.75),px=tcx+(COL_W[4]-pw)/2,py=tcy+(rh-0.22)/2;
        slide.addShape(pres.shapes.ROUNDED_RECTANGLE,{x:px,y:py,w:pw,h:0.22,fill:{color:ob},rectRadius:0.05,line:{color:ob}});
        slide.addText(row.owner,{x:px,y:py,w:pw,h:0.22,fontSize:9,color:oc,align:'center',valign:'middle',fontFace:'Meiryo',bold:true,margin:0});
        tcy+=rh;
      }
    });
  });

  const fileName=`PPM_${c.name}_${c.date||'日付未定'}_${isL?'横':'縦'}.pptx`;
  pres.writeFile({fileName});
}

function renderAll(){ renderCasesBar(); renderMain(); saveToLocal(); }
loadFromLocal();
renderAll = function(){ renderCasesBar(); renderMain(); saveToLocal(); };
loadFromLocal();
renderAll();
</script>
</body>
</html>
